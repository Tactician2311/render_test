# render.yaml
# -----------
# Render Blueprint — defines both services (backend + frontend) in one file.
# Commit this to your GitHub repo root alongside app.py.

services:

  # ── Flask Backend API ──────────────────────────────────────────────────────
  - type: web
    name: driftdater-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 2 app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true       # Render auto-generates a secure random value
      - key: DATABASE_URL
        fromDatabase:
          name: driftdater-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

  # ── PostgreSQL Database ────────────────────────────────────────────────────
databases:
  - name: driftdater-db
    databaseName: driftdater
    user: driftdater
